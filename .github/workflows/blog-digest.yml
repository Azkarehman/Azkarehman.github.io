name: Generate Research Digest

on:
  schedule:
    # Runs Monday and Thursday at 9:00 AM UTC
    - cron: "0 9 * * 1,4"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate digest post
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python scripts/generate_digest.py

      - name: Check for new posts
        id: check
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push new post
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "Research Digest Bot"
          git config user.email "bot@azkarehman.github.io"
          git add content/posts/
          git commit -m "Add research digest for $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push
